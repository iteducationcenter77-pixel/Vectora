<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vectora Design Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/*─────────────────────────────────────────────
  RESET & BASE
─────────────────────────────────────────────*/
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070c;
  --surface:#0f0f18;
  --card:#13131e;
  --border:rgba(255,210,100,0.12);
  --gold:#f0c040;
  --gold2:#ffdc70;
  --white:#f8f4ee;
  --muted:rgba(248,244,238,0.45);
  --dim:rgba(248,244,238,0.18);
  --ff-h:'Playfair Display',Georgia,serif;
  --ff-b:'Outfit',sans-serif;
  --r:6px;
}
html{scroll-behavior:smooth}
body{font-family:var(--ff-b);background:var(--bg);color:var(--white);overflow-x:hidden;line-height:1.6}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{font-family:var(--ff-b);cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:var(--ff-b);outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/*─────────────────────────────────────────────
  COMPONENTS
─────────────────────────────────────────────*/
.button{
  padding:0.5em 1em;
  border-radius:0.5em;
  border:var(--border);
  color:var(--white);
  background:var(--gold);
  cursor:pointer;
  transition:all 0.3s;
}
.button:hover{
  background:var(--gold2);
  color:var(--white);
}
.button:active{
  background:var(--gold);
  color:var(--white);
}
